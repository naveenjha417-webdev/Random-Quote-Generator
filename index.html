<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quote Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="first.css">
</head>
<body>

    <div class="bg-grid"></div>
    <div class="glow glow-cyan"></div>
    <div class="glow glow-violet"></div>

    <main class="card">
        <span class="tag">// quote.generate()</span>

        <blockquote id="quote">
            Honesty is the best policy.
        </blockquote>

        <p id="author">— Unknown</p>

        <div class="actions">
            <button id="generate-btn" class="btn btn-primary">
                New Quote
            </button>
            <button id="copy-btn" class="btn btn-icon" aria-label="Copy quote">
                Copy
            </button>
        </div>

        <p id="copy-status" class="copy-status" aria-live="polite"></p>
    </main>

    <footer class="footer">
        <span id="counter">01 / 20</span>
    </footer>

    <script src="first.js"></script>
</body>
<script src="./first.js"></script> 
</html>
